name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  go:
    name: Go build & test (${{ matrix.go }})
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=mod
    strategy:
      fail-fast: false
      matrix:
        # Minimum supported Go version for this repo.
        # (We can add newer versions once they're available on GitHub-hosted runners.)
        go: [ '1.26.x' ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
          cache-dependency-path: go/go.mod
      - name: Force local toolchain
        run: echo "GOTOOLCHAIN=local" >> $GITHUB_ENV
      - name: Download modules
        working-directory: go
        run: go mod download
      - name: Test
        working-directory: go
        run: go test ./...
      - name: Build
        working-directory: go
        run: go build ./...

  rust:
    name: Rust build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate Cargo.lock
        working-directory: rust/sim
        run: cargo generate-lockfile
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/sim
      - name: Test
        working-directory: rust/sim
        run: cargo test
      - name: Build
        working-directory: rust/sim
        run: cargo build --release

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          # Enable cache when a lockfile exists.
      - run: npm install
      - run: npm run build

  contract-test:
    name: Contract tests (Schemathesis)
    runs-on: ubuntu-latest
    needs: [go, rust]
    steps:
      - uses: actions/checkout@v6
      - name: Start test infra
        run: docker compose -f ci/docker-compose.test.yml up -d --build --wait --wait-timeout 120
      - name: Wait for backends
        run: |
          for port in 8080 8081; do
            for i in $(seq 1 30); do
              if curl -sf http://localhost:$port/healthz > /dev/null 2>&1; then
                echo "Backend on :$port is ready"
                break
              fi
              sleep 2
            done
          done
      - name: Install Schemathesis
        run: pip install schemathesis
      - name: Test Go backend
        run: st run --checks all --url http://localhost:8080 --hypothesis-seed=1 --exclude-path-regex '/v1/sim/' api/openapi.yaml
      - name: Test Rust backend
        run: st run --checks all --url http://localhost:8081 --hypothesis-seed=1 --exclude-path-regex '/v1/sim/' api/openapi.yaml
      - name: Teardown
        if: always()
        run: docker compose -f ci/docker-compose.test.yml down
